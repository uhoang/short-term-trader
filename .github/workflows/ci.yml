name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check .
      - name: Check formatting with black
        run: black --check .
      - name: Type check with mypy
        run: mypy scanner/ signals/ data/ utils/ --ignore-missing-imports
      - name: Run tests
        run: pytest tests/ -v --tb=short
